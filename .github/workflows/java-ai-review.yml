name: Java AI Code Review

on:
  push:
    branches: [ "main" ]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    # Node.js 20 지원 종료 경고를 해결하기 위한 설정
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Changed Java Files
        id: files
        run: |
          # 1. 한글 파일명 깨짐 방지 설정 (중요!)
          git config --global core.quotepath false
          
          # 2. 이번 커밋에서 추가(A)되거나 수정(M)된 자바 파일만 추출
          # 파일명에 공백이 있어도 안전하게 추출합니다.
          FILES=$(git diff --name-only --diff-filter=AM HEAD^ HEAD | grep '\.java$' || true)
          
          # 3. 다중 라인 출력을 위한 EOF 설정 (가장 안전한 방식)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gemini Review
        if: steps.files.outputs.changed_files != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 저장된 파일 목록을 한 줄씩 안전하게 읽어서 처리 (IFS= read -r 사용)
          echo "${{ steps.files.outputs.changed_files }}" | while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "--- Analyzing $file ---"
          
              # 파일 내용 읽기
              CONTENT=$(cat "$file")
          
              # AI에게 보낼 프롬프트 구성
              PROMPT="당신은 Java 알고리즘 전문가입니다. 백준/프로그래머스 문제 풀이인 다음 코드를 분석하여 1. 시간/공간 복잡도, 2. 성능 최적화(BufferedReader 등), 3. 엣지 케이스를 한국어로 리뷰해 주세요. 마크다운 형식을 사용하세요. 코드 내용:\n\n$CONTENT"
          
              # jq를 사용하여 안전하게 JSON 바디 생성
              JSON_BODY=$(jq -n --arg msg "$PROMPT" '{contents: [{parts: [{text: $msg}]}]}')
          
              # 가장 안정적인 gemini-1.5-flash 모델 호출
              RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
                  -H 'Content-Type: application/json' \
                  -d "$JSON_BODY")

              # 응답 결과에서 리뷰 텍스트만 파싱
              REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          
              if [ -n