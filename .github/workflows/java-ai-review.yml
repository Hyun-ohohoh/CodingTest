name: Java AI Code Review

on:
  push:
    branches: [ "main" ]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get Changed Java Files
        id: files
        run: |
          git config --global core.quotepath false
          # 변경된 파일 목록 추출
          FILES=$(git diff --name-only --diff-filter=AM HEAD^ HEAD | grep '\.java$' || true)
          
          # 다중 라인 출력을 위한 EOF 설정
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gemini Review
        if: steps.files.outputs.changed_files != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 파일 목록을 한 줄씩 읽어서 처리
          echo "${{ steps.files.outputs.changed_files }}" | while read -r file; do
            if [ -f "$file" ]; then
              echo "--- Analyzing $file ---"
              CONTENT=$(cat "$file")
              PROMPT="당신은 Java 알고리즘 전문가입니다. 백준/프로그래머스 문제 풀이인 다음 코드를 분석하여 1. 시간/공간 복잡도, 2. 성능 최적화, 3. 엣지 케이스를 한국어로 리뷰해 주세요. 마크다운 형식을 사용하세요. 코드 내용:\n\n$CONTENT"
              JSON_BODY=$(jq -n --arg msg "$PROMPT" '{contents: [{parts: [{text: $msg}]}]}')
          
              RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${GEMINI_API_KEY}" \
                  -H 'Content-Type: application/json' \
                  -d "$JSON_BODY")
          
              REVIEW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          
              if [ -n "$REVIEW" ] && [ "$REVIEW" != "null" ]; then
                gh api \
                  --method POST \
                  -H "Accept: application/vnd.github+json" \
                  /repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
                  -f body="$REVIEW"
              else
                echo "Error: AI 응답 실패"
              fi
            fi
          done